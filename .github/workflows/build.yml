name: Test & build APKs

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # compileSdk/targetSdk 37 — confirmed locally that the SDK ships this
      # as "android-37.1" (a point release), not a bare "android-37"; the
      # runner's pre-installed platforms lag behind a compileSdk this new,
      # so this has to be installed explicitly rather than assumed present.
      - name: Install SDK platform & build-tools
        run: sdkmanager "platforms;android-37.1" "build-tools;37.0.0"

      - name: Unit tests
        run: ./gradlew testGoogleMobileDebugUnitTest --console=plain

      # All 4 flavors — google/amazon x mobile/tv — see app/build.gradle.kts's
      # flavorDimensions comment for why this is one Gradle project instead
      # of four. Debug-signed, sideload-only (matching pantheon-roku's own
      # scope): no release keystore/store-listing wiring in this pass.
      - name: Build all flavor debug APKs
        run: ./gradlew assembleGoogleMobileDebug assembleGoogleTvDebug assembleAmazonMobileDebug assembleAmazonTvDebug --console=plain

      - uses: actions/upload-artifact@v4
        with:
          name: pantheon-google-mobile-debug
          path: app/build/outputs/apk/googleMobile/debug/*.apk
          retention-days: 30
      - uses: actions/upload-artifact@v4
        with:
          name: pantheon-google-tv-debug
          path: app/build/outputs/apk/googleTv/debug/*.apk
          retention-days: 30
      - uses: actions/upload-artifact@v4
        with:
          name: pantheon-amazon-mobile-debug
          path: app/build/outputs/apk/amazonMobile/debug/*.apk
          retention-days: 30
      - uses: actions/upload-artifact@v4
        with:
          name: pantheon-amazon-tv-debug
          path: app/build/outputs/apk/amazonTv/debug/*.apk
          retention-days: 30
