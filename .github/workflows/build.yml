name: Test & build APKs

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # contents: write — needed only by the release-publish step below, but
    # declared at job level since GITHUB_TOKEN permissions can't be
    # elevated mid-job.
    permissions:
      contents: write
    # Read by app/build.gradle.kts's defaultConfig (which also derives
    # versionName from this) — run_number increments on every workflow run
    # (push, PR, or manual dispatch alike), so versionCode is guaranteed
    # strictly higher than the last build's, which sideloaded installs need
    # to actually update in place rather than silently no-op.
    env:
      ANDROID_VERSION_CODE: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # compileSdk/targetSdk 37 — confirmed locally that the SDK ships this
      # as "android-37.1" (a point release), not a bare "android-37"; the
      # runner's pre-installed platforms lag behind a compileSdk this new,
      # so this has to be installed explicitly rather than assumed present.
      - name: Install SDK platform & build-tools
        run: sdkmanager "platforms;android-37.1" "build-tools;37.0.0"

      - name: Unit tests
        run: ./gradlew testGoogleMobileDebugUnitTest --console=plain

      # All 4 flavors — google/amazon x mobile/tv — see app/build.gradle.kts's
      # flavorDimensions comment for why this is one Gradle project instead
      # of four. Debug-signed, sideload-only (matching pantheon-roku's own
      # scope): no release keystore/store-listing wiring in this pass.
      - name: Build all flavor debug APKs
        run: ./gradlew assembleGoogleMobileDebug assembleGoogleTvDebug assembleAmazonMobileDebug assembleAmazonTvDebug --console=plain

      - uses: actions/upload-artifact@v4
        with:
          name: pantheon-google-mobile-debug
          path: app/build/outputs/apk/googleMobile/debug/*.apk
          retention-days: 30
      - uses: actions/upload-artifact@v4
        with:
          name: pantheon-google-tv-debug
          path: app/build/outputs/apk/googleTv/debug/*.apk
          retention-days: 30
      - uses: actions/upload-artifact@v4
        with:
          name: pantheon-amazon-mobile-debug
          path: app/build/outputs/apk/amazonMobile/debug/*.apk
          retention-days: 30
      - uses: actions/upload-artifact@v4
        with:
          name: pantheon-amazon-tv-debug
          path: app/build/outputs/apk/amazonTv/debug/*.apk
          retention-days: 30

      # ── Release-signed build + publish — master pushes only (never PRs,
      # and only once the signing secrets actually exist: a fork of this
      # repo, or a run before secrets were configured, still builds/tests
      # cleanly above and just skips everything below). The decoded
      # keystore only ever lives in RUNNER_TEMP (wiped with the runner at
      # job end) and is never uploaded as an artifact — only the signed
      # APKs it produces are. Secret values themselves are never echoed;
      # GitHub masks any of their exact bytes that *do* end up in log
      # output regardless, but nothing here relies on that as the only
      # safeguard.
      - name: Decode release keystore
        if: >
          github.ref == 'refs/heads/master' &&
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "No ANDROID_KEYSTORE_BASE64 secret configured — skipping release signing/publish."
            exit 0
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"

      - name: Build signed release APKs
        if: env.ANDROID_KEYSTORE_PATH != ''
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleGoogleMobileRelease assembleGoogleTvRelease assembleAmazonMobileRelease assembleAmazonTvRelease --console=plain

      # One rolling "latest" release, republished on every master push —
      # gives users a single stable URL to always grab the current signed
      # build from, and since versionCode always increases (see
      # app/build.gradle.kts), installing it over an existing copy upgrades
      # in place instead of needing an uninstall/reinstall.
      - name: Publish latest release
        if: env.ANDROID_KEYSTORE_PATH != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Pantheon Android (build ${{ github.run_number }})"
          make_latest: true
          body: "Automatically built from master @ ${{ github.sha }}. Signed release APKs — install over an existing copy to update in place."
          files: |
            app/build/outputs/apk/googleMobile/release/*.apk
            app/build/outputs/apk/googleTv/release/*.apk
            app/build/outputs/apk/amazonMobile/release/*.apk
            app/build/outputs/apk/amazonTv/release/*.apk
